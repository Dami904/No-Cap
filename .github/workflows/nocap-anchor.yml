# NoCap — auto-anchor every push to Monad testnet.
# Trust model: this workflow attests "this repo's CI key saw this SHA at this block time."
#
# Required secrets:
#   NOCAP_PRIVATE_KEY  — dedicated burner only (never a funded main wallet)
#   NOCAP_REGISTRY     — deployed NoCapRegistry address
# Optional:
#   NOCAP_RPC_URL
#   NOCAP_MIN_BALANCE_WEI
name: NoCap Anchor

on:
  push:
    branches: ["**"]

permissions:
  contents: read

jobs:
  anchor:
    name: Anchor commit on Monad
    runs-on: ubuntu-latest
    # Don't fail the whole repo CI story if faucet is empty — but fail THIS job loudly.
    continue-on-error: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install CLI deps
        working-directory: packages/cli
        run: npm install

      - name: Balance check + anchor
        working-directory: packages/cli
        env:
          NOCAP_PRIVATE_KEY: ${{ secrets.NOCAP_PRIVATE_KEY }}
          NOCAP_REGISTRY: ${{ secrets.NOCAP_REGISTRY }}
          NOCAP_RPC_URL: ${{ secrets.NOCAP_RPC_URL || 'https://testnet-rpc.monad.xyz' }}
          NOCAP_MIN_BALANCE_WEI: ${{ secrets.NOCAP_MIN_BALANCE_WEI || '10000000000000000' }}
        run: |
          if [ -z "$NOCAP_PRIVATE_KEY" ] || [ -z "$NOCAP_REGISTRY" ]; then
            echo "::error::NOCAP_PRIVATE_KEY and NOCAP_REGISTRY secrets are required."
            exit 1
          fi
          MSG=$(git log -1 --pretty=%s | tr -d '\n' | cut -c1-60)
          npx tsx src/index.ts anchor \
            --repo "${{ github.repository }}" \
            --sha "${{ github.sha }}" \
            --message "$MSG"
