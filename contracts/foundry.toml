# Aligned with monad-developers/foundry-monad template defaults
[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
ffi = false
via_ir = false
eth_rpc_url = "https://testnet-rpc.monad.xyz"
chain_id = 10143

remappings = [
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
  "forge-std/=lib/forge-std/src/"
]

[rpc_endpoints]
monad_testnet = "https://testnet-rpc.monad.xyz"

[etherscan]
# Fallback Sourcify (plan §7). Prefer agents.devnads.com verify API after deploy (monskills scaffold).
monad_testnet = { key = "verifyContract", url = "https://sourcify-api-monad.blockvision.org/" }
